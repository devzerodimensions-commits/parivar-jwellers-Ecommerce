# Render Blueprint — deploys the whole store as ONE free web service.
# The name below becomes your URL:  https://parivarjewellers.onrender.com
# (If "parivarjewellers" is taken, Render will ask you to pick another.)
services:
  - type: web
    name: parivarjewellers
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true          # Render generates a strong secret for you
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: MONGO_URI
        sync: false                  # paste your MongoDB Atlas connection string
      - key: CLIENT_URL
        sync: false                  # set to your final https://<name>.onrender.com
      - key: ADMIN_NAME
        value: Store Admin
      - key: ADMIN_EMAIL
        value: admin@parivarjewellers.com
      - key: ADMIN_PASSWORD
        sync: false                  # choose a strong admin password
      - key: SITE_NAME
        value: Parivar Jewellers
